services:
  landing:
    image: nginx:alpine
    container_name: mvbroker-landing
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - web
    labels:
      # Roteamento feito via infra/traefik/dynamic/app.yml (file provider) → mvbroker-front.
      # Este container nginx existe como fallback; não registra roteador no Traefik.
      - traefik.enable=false

networks:
  web:
    external: true
