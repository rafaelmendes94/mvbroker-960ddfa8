<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MV Broker — Sistema de gestão imobiliária</title>
  <meta name="description" content="MV Broker: plataforma completa para corretores e imobiliárias gerenciarem carteira, captação, exportação para portais e muito mais." />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b1220;color:#e6ecff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:680px;text-align:center}
    h1{font-size:clamp(36px,6vw,64px);line-height:1.05;margin-bottom:16px;background:linear-gradient(90deg,#7dd3fc,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
    p{font-size:18px;opacity:.85;margin-bottom:32px}
    a.btn{display:inline-block;padding:14px 28px;border-radius:10px;background:#3b82f6;color:#fff;text-decoration:none;font-weight:600}
    a.btn:hover{background:#2563eb}
    footer{position:fixed;bottom:16px;font-size:13px;opacity:.5}
  </style>
</head>
<body>
  <main class="card">
    <h1>MV Broker</h1>
    <p>Sistema completo de gestão para corretores e imobiliárias.</p>
    <a class="btn" href="https://app.sistemamvbroker.com.br">Acessar o sistema</a>
  </main>
  <footer>© MV Broker</footer>
</body>
</html>
