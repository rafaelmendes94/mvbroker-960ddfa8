# Roteia app.sistemamvbroker.com.br → container Docker `mvbroker-front` na rede `web`.
# O container é criado pelo deploy.sh (ver DEPLOY.md na raiz do repo).
http:
  routers:
    mvbroker-app:
      rule: "Host(`app.sistemamvbroker.com.br`)"
      entryPoints: [websecure]
      service: mvbroker-app
      tls:
        certResolver: le
  services:
    mvbroker-app:
      loadBalancer:
        servers:
          - url: "http://mvbroker-front:3000"
        passHostHeader: true
