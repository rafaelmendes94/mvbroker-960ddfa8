# Roteia app.sistemamvbroker.com.br → PM2 rodando em 127.0.0.1:3000 (fora do docker).
http:
  routers:
    mvbroker-app:
      rule: "Host(`app.sistemamvbroker.com.br`)"
      entryPoints: [websecure]
      service: mvbroker-app
      tls:
        certResolver: le
  services:
    mvbroker-app:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3000"
        passHostHeader: true
