# Roteia todos os domínios MV Broker → container mvbroker-front (TanStack app).
# NÃO editar manualmente — faz parte da infra da VPS.
http:
  routers:
    mvbroker-app:
      rule: "Host(`app.sistemamvbroker.com.br`)"
      entryPoints: [websecure]
      service: mvbroker-app
      tls:
        certResolver: le

    mvbroker-landing:
      rule: "Host(`sistemamvbroker.com.br`) || Host(`www.sistemamvbroker.com.br`)"
      entryPoints: [websecure]
      service: mvbroker-app
      tls:
        certResolver: le

  services:
    mvbroker-app:
      loadBalancer:
        servers:
          - url: "http://mvbroker-front:3000"
        passHostHeader: true
